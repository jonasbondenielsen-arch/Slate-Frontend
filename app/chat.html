<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#FFFFFF">
  <title>Hr. Slate — Chat</title>
  <link rel="manifest" href="/app/manifest.json">
  <link rel="icon" href="/public/icons/icon.svg" type="image/svg+xml">
  <link rel="icon" type="image/png" sizes="32x32" href="/public/icons/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/public/icons/apple-touch-icon.png">
  <style>
    :root {
      --primary: #1D9E75;
      --primary-light: #9FE1CB;
      --dark: #2C2C2A;
      --dark-2: #444441;
      --dark-3: #5C5C58;
      --muted: #888884;
      --bg: #FFFFFF;
      --bg-2: #F7F6F2;
      --bg-3: #EFEDE7;
      --border: #E5E3DC;
      --text: #1A1A18;
      --lilla: #534AB7;
      --lilla-light: #EEEDFE;
      --lilla-dark: #3C3489;
      --groen-light: #E1F5EE;
      --groen-dark: #085041;
      --coral: #FAECE7;
      --coral-dark: #712B13;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-2);
      color: var(--text);
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    .chat-shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
    }

    /* HEADER */
    .chat-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 10px 12px;
      padding-top: max(10px, env(safe-area-inset-top));
      gap: 8px;
    }

    .back-btn {
      width: 44px;
      height: 44px;
      border: none;
      background: transparent;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--dark-2);
      flex-shrink: 0;
      transition: background 0.15s ease;
    }
    .back-btn:active { background: var(--bg-3); }

    .header-agent {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .agent-avatar {
      width: 38px;
      height: 38px;
      background: var(--dark);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary-light);
      flex-shrink: 0;
    }

    .agent-info { display: flex; flex-direction: column; }
    .agent-name { font-size: 15px; font-weight: 600; color: var(--text); }

    .agent-status {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--muted);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: var(--primary);
      border-radius: 50%;
    }

    .header-spacer { width: 44px; flex-shrink: 0; }

    /* MESSAGES */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* WELCOME */
    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 16px 20px;
      text-align: center;
      gap: 6px;
    }

    .welcome-greeting {
      font-size: 28px;
      font-weight: 700;
      color: var(--dark);
      line-height: 1.1;
    }

    .welcome-sub {
      font-size: 20px;
      font-weight: 400;
      color: var(--dark-3);
    }

    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 340px;
      margin-top: 28px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      text-align: left;
      transition: all 0.15s ease;
      min-height: 50px;
    }
    .action-btn:active { transform: scale(0.97); }

    .action-btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-nyt-tilbud    { background: var(--groen-light); color: var(--groen-dark); }
    .btn-nyt-tilbud .action-btn-icon    { background: rgba(29,158,117,.15); color: var(--primary); }

    .btn-efterkalk     { background: var(--lilla-light); color: var(--lilla-dark); }
    .btn-efterkalk .action-btn-icon     { background: rgba(83,74,183,.15); color: var(--lilla); }

    .btn-billeder      { background: var(--coral); color: var(--coral-dark); }
    .btn-billeder .action-btn-icon      { background: rgba(250,236,231,.5); color: var(--coral-dark); }

    /* CHAT BUBBLES */
    .msg {
      max-width: 82%;
      padding: 11px 14px;
      font-size: 15px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--dark);
      color: var(--primary-light);
      border-radius: 18px 18px 4px 18px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: var(--bg);
      color: var(--text);
      border-radius: 4px 18px 18px 18px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    .msg strong { font-weight: 700; }
    .msg em { font-style: italic; }
    .msg code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: rgba(0,0,0,.06);
      padding: 2px 5px;
      border-radius: 4px;
      font-size: 13px;
    }
    .msg.user code { background: rgba(255,255,255,.1); }

    /* TYPING INDICATOR */
    .typing-indicator {
      align-self: flex-start;
      background: var(--bg);
      border-radius: 4px 18px 18px 18px;
      padding: 14px 18px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: typing 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.9); }
      30% { opacity: 1; transform: scale(1.1); }
    }

    /* EFTERKALK LIST */
    .efterkalk-screen {
      display: flex;
      flex-direction: column;
      padding: 20px 16px 12px;
      gap: 6px;
    }

    .efterkalk-heading {
      font-size: 15px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 6px;
    }

    .efterkalk-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 13px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      cursor: pointer;
      text-align: left;
      transition: all 0.13s ease;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }

    .efterkalk-item:hover { background: var(--bg-2); transform: translateY(-1px); }
    .efterkalk-item:active { transform: scale(0.98); }

    .efterkalk-icon {
      width: 36px;
      height: 36px;
      background: var(--lilla-light);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--lilla);
      flex-shrink: 0;
    }

    .efterkalk-info { flex: 1; min-width: 0; }

    .efterkalk-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .efterkalk-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .efterkalk-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      flex-shrink: 0;
    }

    .efterkalk-amount {
      font-size: 13px;
      font-weight: 600;
      color: var(--dark);
    }

    .efterkalk-date {
      font-size: 11px;
      color: var(--muted);
    }

    /* INPUT BAR */
    .input-bar {
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--bg-2);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 6px 6px 6px 10px;
    }

    .input-add-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: var(--bg-3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--dark-3);
      flex-shrink: 0;
      transition: all 0.15s ease;
      margin-bottom: 1px;
    }
    .input-add-btn:active { background: var(--border); transform: scale(0.95); }

    #chatInput {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.45;
      padding: 5px 2px;
    }

    #chatInput::placeholder { color: var(--muted); }

    .send-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: var(--dark);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--primary-light);
      flex-shrink: 0;
      transition: all 0.15s ease;
      margin-bottom: 1px;
    }
    .send-btn:active { transform: scale(0.95); background: var(--dark-2); }
    .send-btn:disabled { background: var(--bg-3); color: var(--muted); cursor: not-allowed; }

    button:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
  </style>
</head>
<body>
  <div class="chat-shell">
    <header class="chat-header">
      <button class="back-btn" onclick="window.location.href='/app/'" aria-label="Tilbage">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="header-agent">
        <div class="agent-avatar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <div class="agent-info">
          <span class="agent-name">Hr. Slate</span>
          <span class="agent-status"><span class="status-dot"></span>Online</span>
        </div>
      </div>
      <div class="header-spacer"></div>
    </header>

    <div class="messages-container" id="messagesContainer">
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-greeting">Hej mester,</div>
        <div class="welcome-sub">hvad kan jeg hjælpe med?</div>
        <div class="action-buttons">
          <button class="action-btn btn-nyt-tilbud" onclick="startWithAction('nyt-tilbud')">
            <div class="action-btn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/>
              </svg>
            </div>
            Nyt tilbud
          </button>
          <button class="action-btn btn-efterkalk" onclick="startWithAction('efterkalkulation')">
            <div class="action-btn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
              </svg>
            </div>
            Efterkalkulation
          </button>
          <button class="action-btn btn-billeder" onclick="startWithAction('billeder')">
            <div class="action-btn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
              </svg>
            </div>
            Tilføj referencebilleder
          </button>
        </div>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-row">
        <button class="input-add-btn" aria-label="Vedhæft">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <textarea id="chatInput" rows="1" placeholder="Skriv til Hr. Slate..." aria-label="Besked"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const projectId = params.get('project');
    const mode = params.get('mode'); // 'tilbud' | 'efterkalk' | null

    let messages = [];
    let chatHistory = messages;

    function getOrCreateSessionId() {
      let id = sessionStorage.getItem('slate_session_id');
      if (!id) { id = crypto.randomUUID(); sessionStorage.setItem('slate_session_id', id); }
      return id;
    }

    let sessionId = getOrCreateSessionId();

    const container = document.getElementById('messagesContainer');
    const welcomeScreen = document.getElementById('welcomeScreen');
    const input = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    /* ── MODE: NYTTILBUD ── */
    if (mode === 'tilbud') {
      welcomeScreen.style.display = 'none';
      setTimeout(() => {
        appendMessage('assistant', 'Fortæl mig om opgaven, mester \u2014 kunde, type, adresse, st\u00f8rrelse, \u00f8nsker. Bare fyr l\u00f8s.');
        input.focus();
      }, 120);

    /* ── MODE: EFTERKALKULATION ── */
    } else if (mode === 'efterkalk') {
      welcomeScreen.style.display = 'none';
      loadEfterkalkSager();

    /* ── MODE: ÅBEN SAG ── */
    } else if (projectId) {
      welcomeScreen.style.display = 'none';
      appendMessage('assistant', 'God dag mester! \ud83d\udc77 Jeg har hentet sagen. Hvad vil du gerne arbejde med?');

    /* ── DEFAULT: NY SAMTALE ── */
    } else {
      setTimeout(() => appendMessage('assistant', 'Hej mester! \ud83d\udc4b Hvad skal vi i gang med? Du kan starte et nyt tilbud, k\u00f8re en efterkalkulation \u2014 eller bare skrive l\u00f8s, s\u00e5 finder jeg ud af det.'), 400);
    }

    /* ── EFTERKALK: hent sager ── */
    async function loadEfterkalkSager() {
      const firmId = localStorage.getItem('slate_firm_id');
      let sager = [];
      if (firmId) {
        try {
          const res = await fetch(`/api/projects?firm_id=${firmId}&needs_efterkalk=true`);
          const data = await res.json();
          sager = data.projects || [];
        } catch(e) { sager = getDemoEfterkalkSager(); }
      } else {
        sager = getDemoEfterkalkSager();
      }
      renderEfterkalkListe(sager);
    }

    function getDemoEfterkalkSager() {
      return [
        { id: '1', sagsnavn: 'Tagudskiftning Holte',             meta: 'Tagd\u00e6kning \u00b7 180 kvm', beloeb: '312.500 kr', dato: '12. apr' },
        { id: '2', sagsnavn: 'Badeværelse Hellerup \u2014 M\u00f8ller', meta: 'VVS \u00b7 9 kvm',          beloeb: '87.500 kr',  dato: '11. apr' },
        { id: '3', sagsnavn: 'Facade maling Gentofte',            meta: 'Maler',                beloeb: '64.000 kr',  dato: '8. apr'  },
      ];
    }

    function renderEfterkalkListe(sager) {
      if (!sager.length) {
        const el = document.createElement('div');
        el.className = 'msg assistant';
        el.style.marginTop = '20px';
        el.textContent = 'Alle dine sager er efterkalkuleret, mester. Godt gået! 👏';
        container.appendChild(el);
        return;
      }

      const screen = document.createElement('div');
      screen.className = 'efterkalk-screen';
      screen.innerHTML = `<div class="efterkalk-heading">Sager der mangler efterkalkulation</div>` +
        sager.map(s => `
          <button class="efterkalk-item" onclick="startEfterkalk(${JSON.stringify(s).replace(/"/g,'&quot;')})">
            <div class="efterkalk-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
              </svg>
            </div>
            <div class="efterkalk-info">
              <div class="efterkalk-name">${escapeHtml(s.sagsnavn)}</div>
              ${s.meta ? `<div class="efterkalk-meta">${escapeHtml(s.meta)}</div>` : ''}
            </div>
            <div class="efterkalk-right">
              ${s.beloeb ? `<div class="efterkalk-amount">${escapeHtml(s.beloeb)}</div>` : ''}
              ${s.dato ? `<div class="efterkalk-date">${escapeHtml(s.dato)}</div>` : ''}
            </div>
          </button>
        `).join('');
      container.appendChild(screen);
    }

    function startEfterkalk(sag) {
      // Fjern listeskærmen
      const screen = container.querySelector('.efterkalk-screen');
      if (screen) screen.remove();

      const navn = sag.sagsnavn || 'sagen';
      const beloeb = sag.beloeb ? ` til ${sag.beloeb}` : '';
      // Forkortet sagsnavn til besked (første ord i adressen)
      const kortNavn = navn.split(' ')[0] + (navn.includes('\u2014') ? navn.split('\u2014')[0].trim().split(' ').slice(-1)[0] : '');
      appendMessage('assistant', `${navn.split(' \u2014')[0].trim()}-sagen${beloeb} \u2014 er den f\u00e6rdig nu? Fyr l\u00f8s med hvad det endte p\u00e5 i materialer og timer.`);
      input.focus();
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function startWithAction(action) {
      welcomeScreen.remove();
      const texts = {
        'nyt-tilbud': 'Nyt tilbud',
        'efterkalkulation': 'Efterkalkulation',
        'billeder': 'Tilf\u00f8j referencebilleder'
      };
      appendMessage('user', texts[action] || action);
      showTyping();
      setTimeout(() => {
        removeTyping();
        const replies = {
          'nyt-tilbud': 'Super! \ud83d\udccb Hvad er det for en type opgave? T\u00f8mrer, VVS, el, maling, tagd\u00e6kning \u2014 eller noget andet?',
          'efterkalkulation': 'OK \u2014 vi kigger p\u00e5 hvad der gik. Hvilken sag eller periode vil du efterkalkulere?',
          'billeder': 'Send gerne billederne, s\u00e5 analyserer jeg dem og finder relevante referencer fra jeres historik.'
        };
        appendMessage('assistant', replies[action] || 'Hvad vil du gerne?');
      }, 1200);
    }

    function appendMessage(role, text) {
      const el = document.createElement('div');
      el.className = `msg ${role}`;
      el.innerHTML = renderMarkdown(text);
      container.appendChild(el);
      scrollToBottom();
      messages.push({ role, content: text });
    }

    function renderMarkdown(text) {
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
    }

    let typingEl = null;
    function showTyping() {
      typingEl = document.createElement('div');
      typingEl.className = 'typing-indicator';
      typingEl.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
      container.appendChild(typingEl);
      scrollToBottom();
    }

    function removeTyping() {
      if (typingEl) { typingEl.remove(); typingEl = null; }
    }

    function scrollToBottom() {
      container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      // Hide welcome screen on first message
      if (welcomeScreen.parentNode) welcomeScreen.remove();

      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;

      appendMessage('user', text);
      showTyping();

      try {
        const res = await fetch('/api/hrslate-chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            session_id: getOrCreateSessionId(),
            firm_id: localStorage.getItem('slate_firm_id') || null,
            project_id: new URLSearchParams(window.location.search).get('project') || null,
            messages: chatHistory
          })
        });
        const data = await res.json();
        removeTyping();
        appendMessage('assistant', data.response || data.content || data.message || 'Noget gik galt — prøv igen.');
      } catch(e) {
        removeTyping();
        appendMessage('assistant', 'Kunne ikke nå serveren. Tjek forbindelsen og prøv igen.');
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    // Auto-grow textarea
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    // Send on Enter (not Shift+Enter)
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Resize on virtual keyboard
    window.addEventListener('resize', scrollToBottom);
  </script>
</body>
</html>
