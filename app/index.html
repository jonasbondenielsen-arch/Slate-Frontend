<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#FFFFFF">
  <title>Hr. Slate</title>
  <link rel="manifest" href="/app/manifest.json">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
  <style>
    :root {
      --primary: #1D9E75;
      --primary-light: #9FE1CB;
      --dark: #2C2C2A;
      --dark-2: #444441;
      --dark-3: #5C5C58;
      --muted: #888884;
      --bg: #FFFFFF;
      --bg-2: #F7F6F2;
      --bg-3: #EFEDE7;
      --border: #E5E3DC;
      --text: #1A1A18;
      --lilla: #534AB7;
      --lilla-light: #EEEDFE;
      --lilla-dark: #3C3489;
      --blaa: #85B7EB;
      --blaa-dark: #0C447C;
      --blaa-light: #E6F1FB;
      --roed: #A32D2D;
      --amber: #854F0B;
      --amber-light: #FAEEDA;
      --groen-light: #E1F5EE;
      --groen-dark: #085041;
      --coral: #FAECE7;
      --coral-dark: #712B13;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── APP SHELL ─────────────────────────────── */
    .app-shell {
      display: flex;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
    }

    /* ─── SIDEBAR ────────────────────────────────── */
    .sidebar {
      width: 250px;
      flex-shrink: 0;
      background: var(--bg-2);
      display: flex;
      flex-direction: column;
      padding: 10px 8px;
      padding-top: max(10px, env(safe-area-inset-top));
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      overflow: hidden;
      transition: transform 0.25s ease;
    }

    /* ─── SIDEBAR ITEMS (shared base) ─────────────── */
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 13px;
      color: var(--dark-2);
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      text-decoration: none;
      transition: background 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .sidebar-item:hover { background: var(--bg); }

    .sidebar-item.active {
      background: var(--bg);
      color: var(--text);
    }

    .sidebar-item svg {
      width: 16px;
      height: 16px;
      stroke-width: 1.6;
      fill: none;
      flex-shrink: 0;
    }

    /* ─── NEW CONVERSATION ────────────────────────── */
    .sidebar-new {
      font-size: 13px;
      font-weight: 500;
      color: var(--dark);
      margin-bottom: 4px;
    }

    .sidebar-new svg {
      color: var(--dark-2);
    }

    /* ─── SECTION LABELS ─────────────────────────── */
    .sidebar-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--muted);
      padding: 14px 12px 6px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    /* ─── TOOL ICONS ─────────────────────────────── */
    .icon-tilbud   { color: var(--primary); }
    .icon-efterkalk { color: var(--lilla); }
    .icon-overblik { color: var(--muted); }
    .icon-billeder { color: var(--muted); }

    /* ─── RECENT CHATS ────────────────────────────── */
    .sidebar-chats {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      min-height: 0;
    }

    .sidebar-chats::-webkit-scrollbar { width: 0; }

    .sidebar-chat {
      font-size: 12px;
      padding: 7px 12px;
      gap: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-chat svg {
      width: 13px;
      height: 13px;
      stroke: var(--muted);
      flex-shrink: 0;
    }

    .sidebar-chat .chat-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ─── FOOTER ITEMS ────────────────────────────── */
    .sidebar-footer {
      padding-top: 6px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    .sidebar-footer-item {
      font-size: 12px;
      color: var(--muted);
      padding: 7px 12px;
    }

    .sidebar-footer-item svg {
      width: 15px;
      height: 15px;
    }

    /* Slate Pro */
    .sidebar-pro {
      font-size: 12px;
      font-weight: 500;
      color: var(--groen-dark);
      padding: 7px 12px;
    }

    .sidebar-pro:hover { background: var(--groen-light); }

    .sidebar-pro svg {
      width: 15px;
      height: 15px;
      fill: var(--groen-dark);
      stroke: none;
    }

    /* User row */
    .sidebar-user {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 12px;
      color: var(--dark-2);
      cursor: pointer;
      transition: background 0.12s ease;
    }

    .sidebar-user:hover { background: var(--bg); }

    .sidebar-user-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--dark);
      color: var(--primary-light);
      font-size: 9px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ─── MAIN AREA ──────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
      min-width: 0;
    }

    /* Main header */
    .main-header {
      padding: 14px 20px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hamburger-btn {
      display: none;
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      border-radius: 10px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--dark-2);
      flex-shrink: 0;
      transition: background 0.12s;
    }

    .hamburger-btn:hover { background: var(--bg-2); }

    .main-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--dark);
    }

    /* Empty center state */
    .main-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 32px 20px;
    }

    .center-logo {
      margin-bottom: 4px;
    }

    .center-heading {
      font-size: 22px;
      font-weight: 500;
      color: var(--dark);
      letter-spacing: -0.3px;
    }

    .center-sub {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      max-width: 280px;
    }

    /* ─── INPUT AREA ─────────────────────────────── */
    .input-wrap {
      padding: 12px 20px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      display: flex;
      justify-content: center;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 660px;
      border: 0.5px solid var(--border);
      border-radius: 24px;
      padding: 8px 8px 8px 12px;
      background: var(--bg);
    }

    .input-row:focus-within {
      border-color: #C8C6BE;
      box-shadow: 0 0 0 3px rgba(29,158,117,.08);
    }

    .input-add-btn {
      width: 28px;
      height: 28px;
      border: 0.5px solid var(--border);
      background: transparent;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--dark-3);
      flex-shrink: 0;
      transition: background 0.12s;
    }

    .input-add-btn:hover { background: var(--bg-2); }

    .input-field {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
      color: var(--text);
      font-family: inherit;
      resize: none;
      line-height: 1.5;
    }

    .input-field::placeholder { color: var(--muted); }

    .input-send-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--dark);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.12s, transform 0.1s;
    }

    .input-send-btn:hover { background: var(--dark-2); }
    .input-send-btn:active { transform: scale(0.93); }

    /* ─── STATUS BADGES ──────────────────────────── */
    .status-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 7px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .status-kladde    { background: var(--amber-light); color: var(--amber); }
    .status-sendt     { background: var(--blaa-light);  color: var(--blaa-dark); }
    .status-godkendt  { background: var(--groen-light); color: var(--groen-dark); }
    .status-igangsat  { background: var(--lilla-light); color: var(--lilla-dark); }
    .status-faerdig   { background: #F1EFE8;            color: var(--dark-2); }
    .status-efterkalk { background: var(--coral);       color: var(--coral-dark); }

    /* ─── MOBILE OVERLAY ─────────────────────────── */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: 199;
    }

    /* ─── RESPONSIVE ─────────────────────────────── */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 200;
        transform: translateX(-100%);
        box-shadow: 4px 0 24px rgba(0,0,0,.12);
      }

      .sidebar.open { transform: translateX(0); }

      .sidebar-overlay.visible { display: block; }

      .hamburger-btn { display: flex; }

      .main-header { padding: 12px 16px 10px; }

      .input-wrap { padding: 10px 12px; padding-bottom: max(14px, env(safe-area-inset-bottom)); }
    }

    button:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

    /* ─── ICON COLORS ──────────────────────────── */
    .icon-leads { color: #D85A30; }

    /* ─── ONBOARDING OVERLAY ─────────────────────── */
    .onboarding {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 500;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      padding-top: max(32px, env(safe-area-inset-top));
      padding-bottom: max(32px, env(safe-area-inset-bottom));
    }

    .onboarding.visible { display: flex; }

    .ob-logo {
      margin-bottom: 24px;
    }

    .ob-logo img {
      height: 80px;
      width: auto;
      max-width: 240px;
      object-fit: contain;
    }

    .sidebar-logo {
      padding: 6px 8px 10px;
    }

    .sidebar-logo img {
      height: 30px;
      width: auto;
      max-width: 160px;
      object-fit: contain;
    }

    .ob-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--dark);
      text-align: center;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
    }

    .ob-sub {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 36px;
    }

    .ob-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 380px;
    }

    .ob-card {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--bg);
      cursor: pointer;
      text-align: left;
      width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.12s;
    }

    .ob-card:hover {
      border-color: var(--dark-3);
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      transform: translateY(-1px);
    }

    .ob-card:active { transform: scale(0.98); }

    .ob-icon {
      font-size: 28px;
      line-height: 1;
      flex-shrink: 0;
    }

    .ob-card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 5px;
    }

    .ob-card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <!-- ── ONBOARDING ── -->
  <div class="onboarding" id="onboarding">
    <div class="ob-logo">
      <img src="/icons/slate-logo.png" alt="Slate">
    </div>
    <h1 class="ob-title">Velkommen til Slate</h1>
    <p class="ob-sub">Hvad passer bedst p&aring; dig?</p>
    <div class="ob-cards">
      <button class="ob-card" onclick="chooseUserType('haandvaerker')">
        <div class="ob-icon">🔨</div>
        <div>
          <div class="ob-card-title">Jeg er h&aring;ndv&aelig;rker</div>
          <div class="ob-card-desc">Lav tilbud, find opgaver og hold styr p&aring; din forretning</div>
        </div>
      </button>
      <button class="ob-card" onclick="chooseUserType('opgavestiller')">
        <div class="ob-icon">🏠</div>
        <div>
          <div class="ob-card-title">Jeg har en opgave</div>
          <div class="ob-card-desc">Beskriv hvad du skal have lavet og f&aring; svar fra lokale h&aring;ndv&aelig;rkere</div>
        </div>
      </button>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <div class="app-shell">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar" id="sidebar">

      <!-- Logo -->
      <div class="sidebar-logo">
        <img src="/icons/slate-logo.png" alt="Slate">
      </div>

      <!-- Ny samtale -->
      <button class="sidebar-item sidebar-new" data-nav="ny" onclick="navigateTo('ny')">
        <svg viewBox="0 0 24 24" stroke="currentColor">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Ny samtale
      </button>

      <!-- Værktøjer -->
      <div class="sidebar-label">Værktøjer</div>

      <button class="sidebar-item active" data-nav="tilbud" onclick="navigateTo('tilbud')">
        <svg viewBox="0 0 24 24" stroke="currentColor" class="icon-tilbud">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        Nyt tilbud
      </button>

      <button class="sidebar-item" data-nav="efterkalk" onclick="navigateTo('efterkalk')">
        <svg viewBox="0 0 24 24" stroke="currentColor" class="icon-efterkalk">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6"  y1="20" x2="6"  y2="14"/>
        </svg>
        Efterkalkulation
      </button>

      <button class="sidebar-item" data-nav="leads" onclick="navigateTo('leads')">
        <svg viewBox="0 0 24 24" stroke="currentColor" class="icon-leads">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Find opgaver
      </button>

      <button class="sidebar-item" onclick="navigateTo('dashboard')">
        <svg viewBox="0 0 24 24" stroke="currentColor" class="icon-overblik">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>
        Overblik
      </button>

      <button class="sidebar-item" onclick="navigateTo('images')">
        <svg viewBox="0 0 24 24" stroke="currentColor" class="icon-billeder">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        Billeder
      </button>

      <!-- Seneste sager -->
      <div class="sidebar-label">Seneste</div>

      <div class="sidebar-chats" id="sidebarChats">
        <!-- Injected by JS -->
      </div>

      <!-- Footer -->
      <div class="sidebar-footer">
        <button class="sidebar-item sidebar-footer-item" onclick="navigateTo('settings')">
          <svg viewBox="0 0 24 24" stroke="currentColor">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          Indstillinger
        </button>

        <button class="sidebar-item sidebar-footer-item">
          <svg viewBox="0 0 24 24" stroke="currentColor">
            <circle cx="12" cy="12" r="10"/>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          Support
        </button>

        <button class="sidebar-item sidebar-pro">
          <svg viewBox="0 0 24 24">
            <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
          </svg>
          Slate Pro
        </button>

        <div class="sidebar-user" onclick="navigateTo('settings')" id="userRow">
          <div class="sidebar-user-avatar" id="userAvatar">JB</div>
          <span id="userName">Jonas Bonde</span>
          <button onclick="event.stopPropagation();logout()" style="margin-left:auto;border:none;background:none;cursor:pointer;color:var(--muted);padding:2px;flex-shrink:0;" title="Log ud">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- ── MAIN AREA ── -->
    <main class="main">
      <div class="main-header">
        <button class="hamburger-btn" id="hamburgerBtn" onclick="openSidebar()" aria-label="Menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <span class="main-title">Hr. Slate</span>
      </div>

      <div class="main-center">
        <div class="center-logo">
          <img src="/icons/slate-logo.png" alt="Slate" style="height:56px;width:auto;object-fit:contain;">
        </div>
        <h1 class="center-heading">Hvad kan jeg hj&aelig;lpe med?</h1>
        <p class="center-sub">Beskriv din opgave, s&aring; finder jeg tallene.</p>
      </div>

      <div class="input-wrap">
        <div class="input-row">
          <button class="input-add-btn" aria-label="Vedhæft">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
          <input
            class="input-field"
            type="text"
            placeholder="Skriv til Hr. Slate..."
            id="mainInput"
            onkeydown="handleInputKey(event)"
            autocomplete="off"
          >
          <button class="input-send-btn" onclick="startChat()" aria-label="Send">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9FE1CB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/>
              <polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </div>
      </div>
    </main>

  </div>

  <script>
    /* ── NAVIGATION ── */
    function navigateTo(screen) {
      const routes = {
        ny:         '/app/chat.html',
        tilbud:     '/app/chat.html?mode=tilbud',
        efterkalk:  '/app/chat.html?mode=efterkalk',
        leads:      '/app/leads.html',
        dashboard:  '/app/dashboard.html',
        images:     '/app/images.html',
        settings:   '/app/settings.html',
        chat:       '/app/chat.html',
        templates:  '/app/chat.html'
      };
      window.location.href = routes[screen] || '/app/chat.html';
    }

    /* ── ONBOARDING ── */
    function chooseUserType(type) {
      // Store pending choice in sessionStorage, then go to login/signup
      sessionStorage.setItem('slate_pending_user_type', type);
      localStorage.setItem('slate_user_type', type); // keep for UX fallback
      window.location.href = '/app/login.html';
    }

    /* ── SIDEBAR MOBILE ── */
    function openSidebar() {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('sidebarOverlay').classList.add('visible');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('visible');
    }

    /* ── INPUT ── */
    function handleInputKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); startChat(); }
    }

    function startChat() {
      const val = document.getElementById('mainInput').value.trim();
      if (val) {
        sessionStorage.setItem('slate_initial_message', val);
      }
      window.location.href = '/app/chat.html';
    }

    /* ── RECENT PROJECTS IN SIDEBAR ── */
    async function loadProjects() {
      const userId = localStorage.getItem('slate_user_id');
      const firmId = localStorage.getItem('slate_firm_id');

      // Try new sager API first (authenticated users)
      if (userId) {
        try {
          const res = await apiFetch(`/api/data?resource=sager&mester_id=${userId}`);
          if (res.ok) {
            const data = await res.json();
            const list = (data.sager || []).map(s => ({ id: s.id, sagsnavn: s.sagsnavn, status: s.status }));
            if (list.length) { renderSidebarChats(list); return; }
          }
        } catch(e) {}
      }

      // Fall back to old projects API
      if (firmId) {
        try {
          const res = await fetch(`/api/data?resource=projects&firm_id=${firmId}`);
          const data = await res.json();
          if ((data.projects || []).length) { renderSidebarChats(data.projects); return; }
        } catch(e) {}
      }

      renderDemoProjects();
    }

    function renderDemoProjects() {
      renderSidebarChats([
        { sagsnavn: 'Tilbygning Lyngby \u2014 Larsen' },
        { sagsnavn: 'Tagudskiftning Holte' },
        { sagsnavn: 'Badev\u00e6relse Hellerup \u2014 M\u00f8ller' },
        { sagsnavn: 'K\u00f8kken Charlottenlund' },
        { sagsnavn: 'Facaderenovering Gentofte' }
      ]);
    }

    function renderSidebarChats(projects) {
      const el = document.getElementById('sidebarChats');
      if (!projects.length) {
        el.innerHTML = '<div style="padding:8px 12px;font-size:12px;color:var(--muted);">Ingen sager endnu</div>';
        return;
      }
      el.innerHTML = projects.map(p => `
        <button class="sidebar-item sidebar-chat" onclick="openProject('${p.id || ''}')">
          <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.6">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span class="chat-name">${escapeHtml(p.sagsnavn)}</span>
        </button>
      `).join('');
    }

    function openProject(id) {
      window.location.href = id ? `/app/chat.html?project=${id}` : '/app/chat.html';
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── USER INFO ── */
    function loadUser() {
      const name = localStorage.getItem('slate_user_name');
      if (!name) return;
      const initials = name.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
      document.getElementById('userAvatar').textContent = initials;
      document.getElementById('userName').textContent = name;
    }

    /* ── AUTH HELPERS ── */
    function getToken() { return localStorage.getItem('slate_access_token'); }
    async function apiFetch(url, opts = {}) {
      const token = getToken();
      return fetch(url, {
        ...opts,
        headers: { 'Content-Type': 'application/json', ...(token ? { 'Authorization': `Bearer ${token}` } : {}), ...(opts.headers || {}) }
      });
    }

    async function logout() {
      const token = getToken();
      if (token) {
        try { await apiFetch('/api/auth?action=logout', { method: 'POST' }); } catch(e) {}
      }
      ['slate_access_token','slate_refresh_token','slate_user_id','slate_user_type','slate_user_name','slate_firm_id'].forEach(k => localStorage.removeItem(k));
      window.location.href = '/app/login.html';
    }

    /* ── STARTUP ── */
    (function() {
      const token = getToken();
      const userType = localStorage.getItem('slate_user_type');

      if (!token) {
        // No auth token — show onboarding if no prior choice, else go to login
        if (!userType) {
          document.getElementById('onboarding').classList.add('visible');
        } else {
          window.location.replace('/app/login.html');
        }
        return;
      }

      if (userType === 'opgavestiller') {
        window.location.replace('/app/opgavestiller.html');
        return;
      }

      // haandvaerker — load normal app
      loadProjects();
      loadUser();
    })();
  </script>
</body>
</html>
