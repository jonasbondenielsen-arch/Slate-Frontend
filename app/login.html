<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slate — Log ind</title>
  <link rel="manifest" href="/app/manifest.json">
  <link rel="icon" href="/public/icons/icon.svg" type="image/svg+xml">
  <link rel="icon" type="image/png" sizes="32x32" href="/public/icons/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/public/icons/apple-touch-icon.png">
  <style>
    :root {
      --primary: #1D9E75;
      --primary-light: #9FE1CB;
      --dark: #2C2C2A;
      --dark-2: #444441;
      --dark-3: #5C5C58;
      --muted: #888884;
      --bg: #FFFFFF;
      --bg-2: #F7F6F2;
      --bg-3: #EFEDE7;
      --border: #E5E3DC;
      --text: #1A1A18;
      --groen-light: #E1F5EE;
      --groen-dark: #085041;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 380px;
    }

    /* Logo */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .logo-circle {
      width: 44px;
      height: 44px;
      background: var(--dark);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 10px 0;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover {
      color: var(--dark-2);
    }

    .tab-btn.active {
      color: var(--dark);
      border-bottom-color: var(--dark);
      font-weight: 600;
    }

    /* Panels */
    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    /* Form elements */
    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--dark-2);
      margin-bottom: 5px;
    }

    .field input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }

    .field input::placeholder {
      color: var(--muted);
    }

    .field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(29, 158, 117, 0.1);
    }

    /* Password wrapper */
    .pw-wrap {
      position: relative;
    }

    .pw-wrap input {
      padding-right: 42px;
    }

    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      display: flex;
      align-items: center;
      color: var(--muted);
      transition: color 0.15s;
    }

    .pw-toggle:hover {
      color: var(--dark-2);
    }

    /* Submit button */
    .btn-primary {
      width: 100%;
      height: 48px;
      background: var(--dark);
      color: var(--primary-light);
      border: none;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s, background 0.15s;
      font-family: inherit;
      letter-spacing: 0.1px;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--dark-2);
    }

    .btn-primary:disabled {
      cursor: not-allowed;
    }

    /* Error messages */
    .error-msg {
      display: none;
      color: #C0392B;
      font-size: 12px;
      margin-top: 5px;
    }

    .error-msg.form-error {
      margin-top: 8px;
    }

    /* Forgot password link */
    .forgot-link {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }

    .forgot-link:hover {
      color: var(--dark-3);
      text-decoration: underline;
    }

    /* Signup bottom link */
    .switch-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
    }

    .switch-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }

    .switch-link a:hover {
      text-decoration: underline;
    }

    /* Reset panel heading */
    .reset-heading {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .reset-subtext {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      padding: 0;
    }

    .back-link:hover {
      color: var(--dark-2);
    }

    /* Reset success */
    .reset-success {
      display: none;
      text-align: center;
      padding: 20px 0;
    }

    .reset-success .success-icon {
      width: 48px;
      height: 48px;
      background: var(--groen-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .reset-success .success-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--groen-dark);
      margin-bottom: 6px;
    }

    .reset-success .success-text {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* Divider between tabs and reset */
    .reset-panel-inner {
      padding-top: 4px;
    }
  </style>
</head>
<body>

<div class="card">

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-circle">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="14" width="16" height="3" rx="1.5" fill="#9FE1CB"/>
        <rect x="4" y="9" width="16" height="3" rx="1.5" fill="#1D9E75" opacity="0.8"/>
        <rect x="4" y="4" width="16" height="3" rx="1.5" fill="#9FE1CB" opacity="0.5"/>
      </svg>
    </div>
    <span class="logo-name">Slate</span>
  </div>

  <!-- Tabs (hidden during reset) -->
  <div class="tabs" id="tabBar">
    <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Log ind</button>
    <button class="tab-btn" id="tabSignup" onclick="switchTab('signup')">Opret konto</button>
  </div>

  <!-- LOGIN PANEL -->
  <div class="panel active" id="panelLogin">

    <div class="field">
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" placeholder="din@email.dk" autocomplete="email">
    </div>

    <div class="field">
      <label for="loginPassword">Adgangskode</label>
      <div class="pw-wrap">
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
        <button class="pw-toggle" type="button" onclick="togglePassword('loginPassword', this)" aria-label="Vis adgangskode">
          <svg id="eyeIconLogin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <span class="error-msg form-error" id="loginError"></span>

    <button class="btn-primary" id="loginBtn" onclick="login()">Log ind</button>

    <button class="forgot-link" onclick="switchTab('reset')">Glemt adgangskode?</button>

  </div>

  <!-- SIGNUP PANEL -->
  <div class="panel" id="panelSignup">

    <div class="field">
      <label for="signupNavn">Dit fulde navn</label>
      <input type="text" id="signupNavn" placeholder="Jens Jensen" autocomplete="name">
    </div>

    <div class="field">
      <label for="signupEmail">Email</label>
      <input type="email" id="signupEmail" placeholder="din@email.dk" autocomplete="email">
    </div>

    <div class="field">
      <label for="signupTelefon">Telefon</label>
      <input type="tel" id="signupTelefon" placeholder="+45 12 34 56 78" autocomplete="tel">
    </div>

    <div class="field">
      <label for="signupPassword">Adgangskode</label>
      <div class="pw-wrap">
        <input type="password" id="signupPassword" placeholder="Mindst 6 tegn" autocomplete="new-password">
        <button class="pw-toggle" type="button" onclick="togglePassword('signupPassword', this)" aria-label="Vis adgangskode">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <span class="error-msg form-error" id="signupError"></span>

    <button class="btn-primary" id="signupBtn" onclick="signup()">Opret konto</button>

    <p class="switch-link">Allerede bruger? <a onclick="switchTab('login')">Log ind</a></p>

  </div>

  <!-- RESET PANEL -->
  <div class="panel" id="panelReset">
    <div class="reset-panel-inner">

      <div id="resetForm">
        <p class="reset-heading">Nulstil adgangskode</p>
        <p class="reset-subtext">Indtast din email, og vi sender dig et link til at nulstille din adgangskode.</p>

        <div class="field">
          <label for="resetEmail">Email</label>
          <input type="email" id="resetEmail" placeholder="din@email.dk" autocomplete="email">
        </div>

        <span class="error-msg form-error" id="resetError"></span>

        <button class="btn-primary" id="resetBtn" onclick="forgotPassword()">Send nulstillingslink</button>

        <button class="back-link" onclick="switchTab('login')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Tilbage til login
        </button>
      </div>

      <div class="reset-success" id="resetSuccess">
        <div class="success-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <p class="success-title">Link sendt!</p>
        <p class="success-text">Vi har sendt et link til din email.<br>Tjek din indbakke.</p>
        <button class="back-link" style="margin: 20px auto 0; display: inline-flex;" onclick="switchTab('login')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Tilbage til login
        </button>
      </div>

    </div>
  </div>

</div>

<script>
  // ── Tab switching ──────────────────────────────────────────────────────────
  function switchTab(tab) {
    // Hide all panels
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

    // Clear errors
    ['loginError', 'signupError', 'resetError'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.textContent = ''; el.style.display = 'none'; }
    });

    const tabBar = document.getElementById('tabBar');

    if (tab === 'login') {
      document.getElementById('panelLogin').classList.add('active');
      document.getElementById('tabLogin').classList.add('active');
      tabBar.style.display = '';
    } else if (tab === 'signup') {
      document.getElementById('panelSignup').classList.add('active');
      document.getElementById('tabSignup').classList.add('active');
      tabBar.style.display = '';
    } else if (tab === 'reset') {
      document.getElementById('panelReset').classList.add('active');
      tabBar.style.display = 'none';
      // Ensure form is shown, success hidden
      document.getElementById('resetForm').style.display = '';
      document.getElementById('resetSuccess').style.display = 'none';
    }
  }

  // ── Password toggle ────────────────────────────────────────────────────────
  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';

    // Swap icon
    const svg = btn.querySelector('svg');
    if (isPassword) {
      // Eye-off icon
      svg.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      `;
    } else {
      // Eye icon
      svg.innerHTML = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      `;
    }

    btn.setAttribute('aria-label', isPassword ? 'Skjul adgangskode' : 'Vis adgangskode');
  }

  // ── Error helper ───────────────────────────────────────────────────────────
  function showError(id, msg) {
    const el = document.getElementById(id);
    if (el) { el.textContent = msg; el.style.display = 'block'; }
  }

  function clearError(id) {
    const el = document.getElementById(id);
    if (el) { el.textContent = ''; el.style.display = 'none'; }
  }

  // ── Loading state ──────────────────────────────────────────────────────────
  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    btn.disabled = loading;
    btn.style.opacity = loading ? '0.7' : '1';
    if (loading) {
      btn.dataset.originalText = btn.textContent;
      const loadingTexts = {
        loginBtn: 'Logger ind…',
        signupBtn: 'Opretter konto…',
        resetBtn: 'Sender link…'
      };
      btn.textContent = loadingTexts[btnId] || btn.textContent;
    } else {
      btn.textContent = btn.dataset.originalText || btn.textContent;
    }
  }

  // ── Reset success ──────────────────────────────────────────────────────────
  function showResetSuccess() {
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('resetSuccess').style.display = 'block';
  }

  // ── LOGIN ──────────────────────────────────────────────────────────────────
  async function login() {
    clearError('loginError');

    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) {
      showError('loginError', 'Udfyld email og adgangskode');
      return;
    }

    setLoading('loginBtn', true);
    try {
      const res = await fetch('/api/auth?action=login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login fejlede');

      localStorage.setItem('slate_access_token', data.access_token);
      localStorage.setItem('slate_refresh_token', data.refresh_token);
      localStorage.setItem('slate_user_id', data.user_id);
      localStorage.setItem('slate_user_type', data.user_type);
      localStorage.setItem('slate_user_name', data.navn || '');
      if (data.firm_id) localStorage.setItem('slate_firm_id', data.firm_id);

      if (data.user_type === 'opgavestiller') {
        window.location.href = '/app/opgavestiller.html';
      } else {
        window.location.href = '/app/';
      }
    } catch (e) {
      showError(
        'loginError',
        e.message === 'Invalid login credentials'
          ? 'Forkert email eller adgangskode'
          : e.message
      );
    } finally {
      setLoading('loginBtn', false);
    }
  }

  // ── SIGNUP ─────────────────────────────────────────────────────────────────
  async function signup() {
    clearError('signupError');

    const navn = document.getElementById('signupNavn').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const telefon = document.getElementById('signupTelefon').value.trim();
    const password = document.getElementById('signupPassword').value;

    if (!navn || !email || !password) {
      showError('signupError', 'Udfyld alle felter');
      return;
    }
    if (password.length < 6) {
      showError('signupError', 'Adgangskode skal være mindst 6 tegn');
      return;
    }

    const userType = sessionStorage.getItem('slate_pending_user_type') || 'haandvaerker';

    setLoading('signupBtn', true);
    try {
      const res = await fetch('/api/auth?action=signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ navn, email, telefon, password, user_type: userType })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Oprettelse fejlede');

      localStorage.setItem('slate_access_token', data.access_token);
      localStorage.setItem('slate_refresh_token', data.refresh_token);
      localStorage.setItem('slate_user_id', data.user_id);
      localStorage.setItem('slate_user_type', data.user_type);
      localStorage.setItem('slate_user_name', data.navn || '');
      if (data.firm_id) localStorage.setItem('slate_firm_id', data.firm_id);

      if (data.user_type === 'opgavestiller') {
        window.location.href = '/app/opgavestiller.html';
      } else {
        window.location.href = '/app/';
      }
    } catch (e) {
      showError(
        'signupError',
        e.message.includes('already registered')
          ? 'Denne email er allerede oprettet'
          : e.message
      );
    } finally {
      setLoading('signupBtn', false);
    }
  }

  // ── FORGOT PASSWORD ────────────────────────────────────────────────────────
  async function forgotPassword() {
    clearError('resetError');

    const email = document.getElementById('resetEmail').value.trim();
    if (!email) {
      showError('resetError', 'Indtast din email');
      return;
    }

    setLoading('resetBtn', true);
    try {
      await fetch('/api/auth?action=forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      showResetSuccess();
    } catch (e) {
      showError('resetError', 'Noget gik galt — prøv igen');
    } finally {
      setLoading('resetBtn', false);
    }
  }

  // ── Enter key support ──────────────────────────────────────────────────────
  document.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter') return;
    const loginActive = document.getElementById('panelLogin').classList.contains('active');
    const signupActive = document.getElementById('panelSignup').classList.contains('active');
    const resetActive = document.getElementById('panelReset').classList.contains('active');
    if (loginActive) login();
    else if (signupActive) signup();
    else if (resetActive) forgotPassword();
  });

  // ── On load: check session & pending type ──────────────────────────────────
  (function () {
    const token = localStorage.getItem('slate_access_token');
    const userType = localStorage.getItem('slate_user_type');
    if (token && userType) {
      window.location.replace(
        userType === 'opgavestiller' ? '/app/opgavestiller.html' : '/app/'
      );
      return;
    }

    const pendingType = sessionStorage.getItem('slate_pending_user_type');
    if (pendingType) {
      switchTab('signup');
    }
  })();
</script>

</body>
</html>
