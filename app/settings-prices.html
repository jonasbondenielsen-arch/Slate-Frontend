<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#F7F6F2">
  <title>Hr. Slate — Standardpriser</title>
  <link rel="manifest" href="/app/manifest.json">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
  <style>
    :root {
      --primary: #1D9E75;
      --primary-light: #9FE1CB;
      --dark: #2C2C2A;
      --dark-2: #444441;
      --dark-3: #5C5C58;
      --muted: #888884;
      --bg: #FFFFFF;
      --bg-2: #F7F6F2;
      --bg-3: #EFEDE7;
      --border: #E5E3DC;
      --text: #1A1A18;
      --roed: #A32D2D;
      --groen-light: #E1F5EE;
      --lilla: #534AB7;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-2);
      color: var(--text);
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }

    .page-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(247,246,242,0.95);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
    }
    .back-btn {
      width: 44px; height: 44px; border: none; background: transparent;
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--dark-2); flex-shrink: 0;
      transition: background 0.15s ease;
    }
    .back-btn:active { background: var(--bg-3); }
    .page-title { font-size: 18px; font-weight: 700; color: var(--dark); flex: 1; }
    .save-btn {
      padding: 8px 16px; background: var(--primary); color: white;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s ease;
    }
    .save-btn:active { transform: scale(0.95); }

    .content { padding: 16px; display: flex; flex-direction: column; gap: 16px; }

    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .section-title { font-size: 13px; font-weight: 700; color: var(--dark); }
    .add-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px; background: var(--groen-light); color: var(--primary);
      border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.15s ease;
    }
    .add-btn:active { transform: scale(0.95); }

    .price-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    .price-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }
    .price-row:last-child { border-bottom: none; }

    .price-label { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); }
    .price-unit  { font-size: 12px; color: var(--muted); }

    .price-input {
      width: 90px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      color: var(--text);
      background: var(--bg-2);
      outline: none;
      text-align: right;
      -webkit-appearance: none;
    }
    .price-input:focus { border-color: var(--primary); background: var(--bg); }

    .pct-input {
      width: 70px;
    }

    .del-btn {
      width: 32px; height: 32px;
      border: none; background: transparent; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted); flex-shrink: 0;
      transition: all 0.15s ease;
    }
    .del-btn:active { background: rgba(163,45,45,.08); color: var(--roed); }

    .custom-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }
    .custom-row:last-child { border-bottom: none; }

    .custom-name-input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg-2);
      outline: none;
    }
    .custom-name-input:focus { border-color: var(--primary); background: var(--bg); }

    .toast {
      position: fixed; bottom: max(24px, env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--dark); color: white;
      padding: 12px 20px; border-radius: 12px;
      font-size: 14px; font-weight: 500;
      transition: transform 0.3s ease;
      pointer-events: none; white-space: nowrap; z-index: 999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    button:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
  </style>
</head>
<body>
  <header class="page-header">
    <button class="back-btn" onclick="window.location.href='/app/settings.html'" aria-label="Tilbage">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <h1 class="page-title">Priser &amp; takster</h1>
    <button class="save-btn" onclick="savePrices()">Gem</button>
  </header>

  <div class="content">

    <!-- TIMELØNNER -->
    <div>
      <div class="section-header">
        <span class="section-title">Timelønner</span>
      </div>
      <div class="price-card">
        <div class="price-row">
          <div>
            <div class="price-label">Svend / specialiseret</div>
            <div class="price-unit">kr./time</div>
          </div>
          <input type="number" class="price-input" id="timeSvend" value="525" min="0">
        </div>
        <div class="price-row">
          <div>
            <div class="price-label">Lærling / hjælper</div>
            <div class="price-unit">kr./time</div>
          </div>
          <input type="number" class="price-input" id="timeLaerling" value="295" min="0">
        </div>
        <div class="price-row">
          <div>
            <div class="price-label">Formand / projektleder</div>
            <div class="price-unit">kr./time</div>
          </div>
          <input type="number" class="price-input" id="timeFormand" value="650" min="0">
        </div>
        <div class="price-row">
          <div>
            <div class="price-label">Overtidstillæg</div>
            <div class="price-unit">%</div>
          </div>
          <input type="number" class="price-input pct-input" id="overtime" value="50" min="0">
        </div>
      </div>
    </div>

    <!-- AVANCE & TILLÆG -->
    <div>
      <div class="section-header">
        <span class="section-title">Avance &amp; tillæg</span>
      </div>
      <div class="price-card">
        <div class="price-row">
          <div>
            <div class="price-label">Materialetillæg</div>
            <div class="price-unit">% oven på indkøbspris</div>
          </div>
          <input type="number" class="price-input pct-input" id="materialeTillaeg" value="15" min="0">
        </div>
        <div class="price-row">
          <div>
            <div class="price-label">Underleverandørtillæg</div>
            <div class="price-unit">%</div>
          </div>
          <input type="number" class="price-input pct-input" id="underleverandoer" value="10" min="0">
        </div>
        <div class="price-row">
          <div>
            <div class="price-label">Byggeplads-overhead</div>
            <div class="price-unit">%</div>
          </div>
          <input type="number" class="price-input pct-input" id="byggepladsOverhead" value="8" min="0">
        </div>
        <div class="price-row">
          <div>
            <div class="price-label">Dækningsbidrag (mål)</div>
            <div class="price-unit">%</div>
          </div>
          <input type="number" class="price-input pct-input" id="dbMaal" value="35" min="0">
        </div>
      </div>
    </div>

    <!-- FASTE TAKSTER -->
    <div>
      <div class="section-header">
        <span class="section-title">Faste takster</span>
        <button class="add-btn" onclick="addCustomRate()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Tilføj
        </button>
      </div>
      <div class="price-card" id="customRatesList">
        <div class="custom-row" data-id="opstilling">
          <input type="text" class="custom-name-input" value="Opstillingstillæg" placeholder="Navn">
          <input type="number" class="price-input" value="1200" min="0">
          <span style="font-size:12px;color:var(--muted);white-space:nowrap">kr.</span>
          <button class="del-btn" onclick="removeRow(this)" aria-label="Fjern">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="custom-row" data-id="spildtid">
          <input type="text" class="custom-name-input" value="Spildtid transport" placeholder="Navn">
          <input type="number" class="price-input" value="750" min="0">
          <span style="font-size:12px;color:var(--muted);white-space:nowrap">kr.</span>
          <button class="del-btn" onclick="removeRow(this)" aria-label="Fjern">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Priser gemt ✓</div>

  <script>
    function addCustomRate() {
      const list = document.getElementById('customRatesList');
      const row = document.createElement('div');
      row.className = 'custom-row';
      row.innerHTML = `
        <input type="text" class="custom-name-input" placeholder="Takst-navn">
        <input type="number" class="price-input" placeholder="0" min="0">
        <span style="font-size:12px;color:var(--muted);white-space:nowrap">kr.</span>
        <button class="del-btn" onclick="removeRow(this)" aria-label="Fjern">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>`;
      list.appendChild(row);
      row.querySelector('input[type=text]').focus();
    }

    function removeRow(btn) {
      btn.closest('.custom-row').remove();
    }

    async function savePrices() {
      const data = {
        timeSvend:           document.getElementById('timeSvend').value,
        timeLaerling:        document.getElementById('timeLaerling').value,
        timeFormand:         document.getElementById('timeFormand').value,
        overtime:            document.getElementById('overtime').value,
        materialeTillaeg:    document.getElementById('materialeTillaeg').value,
        underleverandoer:    document.getElementById('underleverandoer').value,
        byggepladsOverhead:  document.getElementById('byggepladsOverhead').value,
        dbMaal:              document.getElementById('dbMaal').value,
        customRates: Array.from(document.querySelectorAll('#customRatesList .custom-row')).map(row => ({
          navn: row.querySelector('input[type=text]').value,
          beloeb: row.querySelector('input[type=number]').value,
        }))
      };

      localStorage.setItem('slate_prices', JSON.stringify(data));

      try {
        await fetch('/api/standards', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
      } catch(e) { /* offline */ }

      showToast('Priser gemt ✓');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // Load saved
    window.addEventListener('DOMContentLoaded', () => {
      const saved = JSON.parse(localStorage.getItem('slate_prices') || '{}');
      ['timeSvend','timeLaerling','timeFormand','overtime','materialeTillaeg','underleverandoer','byggepladsOverhead','dbMaal'].forEach(k => {
        const el = document.getElementById(k);
        if (el && saved[k]) el.value = saved[k];
      });
    });
  </script>
</body>
</html>
